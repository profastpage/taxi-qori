<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - QORI Panel Administrativo</title>
    <meta name="description" content="Acceso exclusivo para administradores QORI">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0D3B4A">
    
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">

    <!-- Google Fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"></noscript>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            teal: '#0D3B4A',
                            tealDark: '#082830',
                            gold: '#F4B41A',
                            goldDark: '#D49A12',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Styles -->
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0D3B4A 0%, #082830 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glass Effect */
        .glass {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Input Fields */
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #F4B41A;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(244, 180, 26, 0.1);
        }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, #F4B41A 0%, #D49A12 100%);
            color: #0a0a0a;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 180, 26, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 180, 26, 0.4);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(244, 180, 26, 0.3); }
            50% { box-shadow: 0 0 40px rgba(244, 180, 26, 0.5); }
        }

        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        /* Alert Styles */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-8 animate-fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-[#F4B41A] to-[#D49A12] mb-4 pulse-glow">
                <i class="fas fa-shield-alt text-4xl text-black"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white mb-2">QORI Admin</h1>
            <p class="text-gray-400 text-sm">Panel Administrativo Exclusivo</p>
        </div>

        <!-- Login Form -->
        <div class="glass rounded-3xl p-8 shadow-2xl animate-fade-in" style="animation-delay: 0.1s;">
            
            <!-- Alert Container -->
            <div id="alert-container"></div>

            <form id="admin-login-form" class="space-y-6">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">
                        <i class="fas fa-envelope text-[#F4B41A] mr-2"></i>
                        Email Administrativo
                    </label>
                    <div class="relative">
                        <i class="fas fa-at text-gray-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input 
                            type="email" 
                            id="email"
                            required 
                            class="input-field w-full pl-12 pr-4 py-3.5 text-white placeholder-gray-500 focus:border-[#F4B41A] focus:ring-2 focus:ring-[#F4B41A]/20 transition-all" 
                            placeholder="admin@qori.com"
                            autocomplete="email"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">
                        <i class="fas fa-lock text-[#F4B41A] mr-2"></i>
                        Contraseña
                    </label>
                    <div class="relative">
                        <i class="fas fa-key text-gray-500 absolute left-4 top-1/2 -translate-y-1/2"></i>
                        <input 
                            type="password" 
                            id="password"
                            required 
                            minlength="4"
                            class="input-field w-full pl-12 pr-12 py-3.5 text-white placeholder-gray-500 focus:border-[#F4B41A] focus:ring-2 focus:ring-[#F4B41A]/20 transition-all" 
                            placeholder="••••"
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-[#F4B41A] transition-colors"
                        >
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-700 bg-[#1a1a1a] text-[#F4B41A] focus:ring-[#F4B41A] focus:ring-offset-0">
                        <span class="text-sm text-gray-400">Recordar sesión</span>
                    </label>
                    <a href="#" class="text-sm text-[#F4B41A] hover:text-[#D49A12] transition-colors">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submit-btn"
                    class="btn-primary w-full py-4 rounded-xl font-bold text-base flex items-center justify-center gap-2"
                >
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>

            <!-- Security Notice -->
            <div class="mt-6 pt-6 border-t border-gray-800">
                <div class="flex items-start gap-3 text-xs text-gray-500">
                    <i class="fas fa-lock text-[#F4B41A] mt-0.5"></i>
                    <p>Acceso restringido exclusivamente para personal administrativo autorizado de QORI.</p>
                </div>
            </div>
        </div>

        <!-- Back to Site -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-gray-400 hover:text-white text-sm transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i>
                Volver al sitio principal
            </a>
        </div>
    </div>

    <!-- FontAwesome -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>

    <!-- Scripts -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // Show Alert
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            const alertClass = type === 'error' ? 'alert-error' : 'alert-success';
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            
            container.innerHTML = `
                <div class="alert ${alertClass} animate-fade-in">
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                </div>
            `;
        }

        // Clear Alert
        function clearAlert() {
            document.getElementById('alert-container').innerHTML = '';
        }

        // Admin Login Handler
        document.getElementById('admin-login-form')?.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            
            // Clear previous alerts
            clearAlert();
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Verificando credenciales...</span>
            `;
            
            // Simulate authentication delay
            setTimeout(() => {
                // Validate credentials
                if (email === 'admin@qori.com' && password === '1234') {
                    // Success - Save admin session
                    localStorage.setItem('qori_admin_logged_in', 'true');
                    localStorage.setItem('qori_admin_email', email);
                    localStorage.setItem('qori_admin_login_time', new Date().toISOString());
                    
                    showAlert('¡Autenticación exitosa! Redirigiendo...', 'success');
                    
                    // Redirect to admin dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                } else {
                    // Failed login
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `
                        <i class="fas fa-sign-in-alt"></i>
                        Iniciar Sesión
                    `;
                    
                    showAlert('Credenciales incorrectas. Verifica tu email y contraseña.');
                    
                    // Shake animation on form
                    document.querySelector('.glass').classList.add('animate-pulse');
                    setTimeout(() => {
                        document.querySelector('.glass').classList.remove('animate-pulse');
                    }, 500);
                }
            }, 1500);
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const isAdminLoggedIn = localStorage.getItem('qori_admin_logged_in') === 'true';
            if (isAdminLoggedIn) {
                window.location.href = 'admin-dashboard.html';
            }
            
            // Check for URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('logged') === 'out') {
                showAlert('Sesión cerrada correctamente. ¡Hasta luego!', 'success');
            }
        });
    </script>
</body>
</html>
